name: Crystal CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/README.md'
      - '**/CHANGES.md'
      - '**/MANIFEST.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/README.md'
      - '**/CHANGES.md'
      - '**/MANIFEST.md'

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    container:
      image: crystallang/crystal

    steps:
    - uses: actions/checkout@v2
    - name: Install dependencies
      run: shards install
    - name: Run tests
      run: crystal spec
